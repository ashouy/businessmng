spring.application.name=businessmng
server.port=8080
server.servlet.context-path=/api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# 256-bit secret (example only; replace with a secure value from env in production)
app.jwt.secret=Z2VuZXJhdGUtYS1sb25nLXNlY3JldC1rZXktZm9yLWJ1c2luZXNzLW1hbmFnZXI=

# Cookie options used by AuthController/AuthService
app.auth.cookie.secure=false
app.auth.cookie.path=/