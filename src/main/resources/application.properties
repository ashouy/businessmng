spring.application.name=businessmng
server.port=8080
server.servlet.context-path=/api

# Active Profile (override with spring.profiles.active or environment variable)
spring.profiles.active=dev

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/changelog-master.xml

# JWT Configuration
app.jwt.secret=Z2VuZXJhdGUtYS1sb25nLXNlY3JldC1rZXktZm9yLWJ1c2luZXNzLW1hbmFnZXI=

# Cookie Options
app.auth.cookie.secure=false
app.auth.cookie.path=/