# Development Environment Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/businessmng_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=businessmng_user
spring.datasource.password=businessmng_password

# PostgreSQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Development-specific settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Development JWT (less secure - for testing only)
app.jwt.secret=dev-secret-key-change-in-production
app.auth.cookie.secure=false