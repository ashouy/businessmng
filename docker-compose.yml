version: '3.8'

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: businessmng-postgres
    environment:
      POSTGRES_DB: businessmng_db
      POSTGRES_USER: businessmng_user
      POSTGRES_PASSWORD: businessmng_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - businessmng-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U businessmng_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  businessmng-network:
    driver: bridge